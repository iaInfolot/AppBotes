<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loterías y Apuestas del Estado — Botes y Resultados</title>
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-page:   #F4F3EF;
    --bg-card:   #FFFFFF;
    --bg-muted:  #ECEAE3;
    --border:    rgba(0,0,0,0.10);
    --border-md: rgba(0,0,0,0.18);
    --text-1:    #1A1A18;
    --text-2:    #5C5B56;
    --text-3:    #8E8D88;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --font: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }

  /* ── Dark mode ── */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-page:  #111110;
      --bg-card:  #1C1C1A;
      --bg-muted: #262624;
      --border:   rgba(255,255,255,0.09);
      --border-md:rgba(255,255,255,0.18);
      --text-1:   #EEECEA;
      --text-2:   #8E8D88;
      --text-3:   #5C5B56;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg-page);
    color: var(--text-1);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    background: var(--bg-card);
    border-bottom: 0.5px solid var(--border);
    padding: 0.85rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo-box {
    width: 46px; height: 46px;
    background: #FEF3E0;
    border: 1.5px solid #C8820A;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-info { display: flex; align-items: center; gap: 12px; }
  .header-title { font-weight: 600; font-size: 17px; color: var(--text-1); }
  .header-sub   { font-size: 12px; color: var(--text-2); margin-top: 2px; }
  .header-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    background: var(--bg-muted);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 3px;
    gap: 2px;
  }
  .tab-btn {
    padding: 8px 24px;
    border: none; cursor: pointer;
    font-size: 15px;
    border-radius: 10px;
    transition: background 0.15s, color 0.15s;
  }
  .tab-btn.active {
    background: var(--bg-card);
    font-weight: 600;
    color: var(--text-1);
    border: 0.5px solid var(--border);
  }
  .tab-btn:not(.active) {
    background: transparent;
    color: var(--text-2);
  }
  .tab-btn:not(.active):hover { background: rgba(0,0,0,0.04); }

  /* ── Refresh btn ── */
  .refresh-btn {
    padding: 8px 16px;
    background: var(--bg-muted);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-2);
    cursor: pointer;
    transition: background 0.15s;
  }
  .refresh-btn:hover { background: var(--border); }
  .refresh-btn:disabled { opacity: 0.5; cursor: default; }

  /* ── Content ── */
  .content { padding: 1.25rem 1.5rem; }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-3);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  /* ── Botes grid ── */
  .botes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .game-card {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;
    position: relative;
    overflow: hidden;
    transition: transform 0.12s;
  }
  .game-card:hover { transform: translateY(-1px); }
  .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
  }
  .game-icon {
    width: 52px; height: 52px;
    flex-shrink: 0;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    letter-spacing: 0.5px;
    border-width: 1.5px; border-style: solid;
  }
  .game-name {
    font-weight: 600;
    font-size: 15px;
    color: var(--text-1);
    line-height: 1.3;
  }
  .game-date {
    font-size: 12px;
    color: var(--text-2);
    margin-top: 3px;
    text-transform: capitalize;
  }
  .jackpot-label {
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .jackpot-amount {
    font-weight: 700;
    line-height: 1.1;
  }
  .j-xl  { font-size: 32px; }
  .j-lg  { font-size: 26px; }
  .j-md  { font-size: 22px; }
  .j-sm  { font-size: 18px; }
  .j-monthly-note {
    font-size: 12px;
    color: var(--text-2);
    margin-top: 3px;
  }
  .addon {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 0.5px solid var(--border);
  }
  .addon-label {
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .addon-amount {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-1);
  }

  /* ── Results ── */
  .results-list { display: flex; flex-direction: column; gap: 12px; }
  .result-card {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;
    border-left-width: 4px;
    border-left-style: solid;
  }
  .result-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .result-meta { display: flex; align-items: center; gap: 10px; }
  .result-prize-label { font-size: 11px; color: var(--text-3); text-align: right; }
  .result-prize { font-size: 17px; font-weight: 600; text-align: right; margin-top: 1px; }

  /* ── Balls ── */
  .balls-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
  }
  .ball {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    border-width: 1.5px;
    border-style: solid;
    flex-shrink: 0;
  }
  .ball-sep {
    font-size: 13px;
    color: var(--text-3);
    margin: 0 1px;
  }

  /* ── Loading / empty ── */
  .loading-msg {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-2);
    font-size: 16px;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border-md);
    border-top-color: #BA7517;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TV / large screen ── */
  @media (min-width: 1280px) {
    .header { padding: 1rem 2.5rem; }
    .content { padding: 1.5rem 2.5rem; }
    .header-title { font-size: 20px; }
    .tab-btn { font-size: 17px; padding: 10px 30px; }
    .game-name { font-size: 17px; }
    .j-xl  { font-size: 40px; }
    .j-lg  { font-size: 32px; }
    .j-md  { font-size: 26px; }
    .j-sm  { font-size: 22px; }
    .ball  { width: 46px; height: 46px; font-size: 16px; }
    .botes-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  }
  @media (min-width: 1920px) {
    .botes-grid { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }
    .j-xl { font-size: 50px; }
    .j-lg { font-size: 40px; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="header-info">
      <div class="logo-box">
        <svg viewBox="0 0 24 24" width="28" height="28">
          <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="#C8820A"/>
        </svg>
      </div>
      <div>
        <div class="header-title">Loterías y Apuestas del Estado</div>
        <div class="header-sub" id="hdr-updated">Cargando...</div>
      </div>
    </div>
    <div class="header-controls">
      <button class="refresh-btn" id="btn-refresh" onclick="doRefresh()">&#8635; Actualizar</button>
      <div class="tabs">
        <button class="tab-btn active" id="tab-botes"      onclick="setTab('botes')">Botes</button>
        <button class="tab-btn"        id="tab-resultados" onclick="setTab('resultados')">Resultados</button>
      </div>
    </div>
  </div>
  <div class="content" id="content">
    <div class="loading-msg"><span class="spinner"></span>Cargando sorteos...</div>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  CONFIGURACIÓN — ajusta esta URL a tu web service        ║
// ╚══════════════════════════════════════════════════════════╝
const API_BOTES   = "https://TU-API.COM/botes";      // GET → JSON descrito en requisitos
const API_RESULTS = "https://TU-API.COM/resultados";  // GET → JSON resultados (ver estructura abajo)
const REFRESH_MS  = 5 * 60 * 1000;  // auto-refresh cada 5 minutos

// ── Datos demo (se usan si la API no responde) ────────────
const DEMO_JACKPOTS = {data:[
  {id_game:2,  name:"La Primitiva",            date:"2026-04-26",jackpot:7500000, addons:[{name:"Joker",jackpot:1000000}]},
  {id_game:4,  name:"Bonoloto",                date:"2026-04-28",jackpot:1100000},
  {id_game:43, name:"EuroDreams",              date:"2026-04-24",jackpot:20000,  monthly:true},
  {id_game:1,  name:"Euromillones",            date:"2026-04-25",jackpot:63000000,addons:[{name:"El Millón",jackpot:1000000}]},
  {id_game:5,  name:"El Gordo de la Primitiva",date:"2026-04-27",jackpot:4500000},
  {id_game:25, name:"La Quiniela",             date:"2026-04-27",jackpot:0},
  {id_game:26, name:"QuiniGol",                date:"2026-04-27",jackpot:145000},
  {id_game:21, name:"LotoTurf",                date:"2026-04-27",jackpot:1445000}
]};

const DEMO_RESULTS = {data:[
  {id_game:1, name:"Euromillones",            date:"2026-04-22",numbers:[3,15,23,41,48],stars:[2,9],prize:45000000,winners:0},
  {id_game:2, name:"La Primitiva",            date:"2026-04-21",numbers:[7,14,22,33,40,42],complement:5,reintegro:3,prize:5200000,winners:1},
  {id_game:4, name:"Bonoloto",                date:"2026-04-23",numbers:[2,11,27,35,44,47],complement:12,reintegro:7,prize:900000,winners:0},
  {id_game:5, name:"El Gordo de la Primitiva",date:"2026-04-20",numbers:[8,16,25,37,49],reintegro:4,prize:3800000,winners:2},
  {id_game:43,name:"EuroDreams",              date:"2026-04-24",numbers:[5,12,18,26,34,41],dream:2,prize:20000,winners:1,monthly:true}
]};

// ── Configuración visual por juego ────────────────────────
const GAME_CFG = {
  1: {abbr:"EM", color:"#C8820A", bg:"#FEF3E0", txt:"#3D2100"},
  2: {abbr:"PR", color:"#A32D2D", bg:"#FCEBEB", txt:"#501313"},
  4: {abbr:"BN", color:"#185FA5", bg:"#E6F1FB", txt:"#042C53"},
 43: {abbr:"ED", color:"#534AB7", bg:"#EEEDFE", txt:"#26215C"},
  5: {abbr:"GP", color:"#993C1D", bg:"#FAECE7", txt:"#4A1B0C"},
 25: {abbr:"QN", color:"#3B6D11", bg:"#EAF3DE", txt:"#173404"},
 26: {abbr:"QG", color:"#27500A", bg:"#EAF3DE", txt:"#173404"},
 21: {abbr:"LT", color:"#0F6E56", bg:"#E1F5EE", txt:"#04342C"}
};

// Bolas por tipo
const BALL_CFG = {
  normal: {bg:"#E6F1FB",txt:"#042C53",bd:"#185FA5"},
  star:   {bg:"#FAEEDA",txt:"#412402",bd:"#BA7517"},
  compl:  {bg:"#FCEBEB",txt:"#501313",bd:"#A32D2D"},
  rein:   {bg:"#EAF3DE",txt:"#173404",bd:"#3B6D11"},
  dream:  {bg:"#EEEDFE",txt:"#26215C",bd:"#534AB7"}
};

// ── Estado ────────────────────────────────────────────────
let gTab     = "botes";
let gBotes   = null;
let gResults = null;
let refreshTimer = null;

// ── Utilidades ────────────────────────────────────────────
const fmt = n =>
  n === 0 ? "—" :
  new Intl.NumberFormat("es-ES", {style:"currency",currency:"EUR",maximumFractionDigits:0}).format(n);

const fmtLong  = s => new Date(s+"T12:00:00").toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"});
const fmtShort = s => new Date(s+"T12:00:00").toLocaleDateString("es-ES",{day:"numeric",month:"long",year:"numeric"});
const fmtTime  = d => d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});

function cfg(id){ return GAME_CFG[id] || {abbr:"??",color:"#888",bg:"#eee",txt:"#333"}; }

function gameIcon(id){
  const c = cfg(id);
  return `<div class="game-icon" style="background:${c.bg};border-color:${c.color};color:${c.color}">${c.abbr}</div>`;
}

function ball(num, type="normal"){
  const c = BALL_CFG[type] || BALL_CFG.normal;
  return `<div class="ball" style="background:${c.bg};border-color:${c.bd};color:${c.txt}">${num}</div>`;
}

// ── Renderizado: Botes ────────────────────────────────────
function renderBotes(data){
  if(!data) return `<div class="loading-msg"><span class="spinner"></span>Cargando botes...</div>`;
  const games = data.data || data;
  return `
    <p class="section-title">Próximos sorteos</p>
    <div class="botes-grid">
    ${games.map(g => {
      const c = cfg(g.id_game);
      const j = g.jackpot;
      let szClass = "j-sm";
      if(j >= 50000000) szClass = "j-xl";
      else if(j >= 10000000) szClass = "j-lg";
      else if(j >= 2000000)  szClass = "j-md";

      const jHtml =
        j === 0
          ? `<span class="jackpot-amount j-sm" style="color:var(--text-2)">Consultar</span>`
          : g.monthly
            ? `<span class="jackpot-amount j-md" style="color:${c.color}">${fmt(j)}<span style="font-size:13px;font-weight:400;color:var(--text-2)">/mes</span></span>`
            : `<span class="jackpot-amount ${szClass}" style="color:${c.color}">${fmt(j)}</span>`;

      const addonsHtml = (g.addons||[]).map(a => `
        <div class="addon">
          <div class="addon-label">${a.name}</div>
          <div class="addon-amount">${fmt(a.jackpot)}</div>
        </div>`).join("");

      return `
        <div class="game-card">
          <div class="card-accent" style="background:${c.color}"></div>
          <div class="card-top">
            ${gameIcon(g.id_game)}
            <div>
              <div class="game-name">${g.name}</div>
              <div class="game-date">${fmtLong(g.date)}</div>
            </div>
          </div>
          <div class="jackpot-label">Bote</div>
          ${jHtml}
          ${g.monthly ? `<p class="j-monthly-note">durante 30 años</p>` : ""}
          ${addonsHtml}
        </div>`;
    }).join("")}
    </div>`;
}

// ── Renderizado: Resultados ───────────────────────────────
function renderResultados(data){
  if(!data) return `<div class="loading-msg"><span class="spinner"></span>Cargando resultados...</div>`;
  const results = data.data || data;
  return `
    <p class="section-title">Últimos resultados</p>
    <div class="results-list">
    ${results.map(r => {
      const c = cfg(r.id_game);
      const noWinner = r.winners === 0;
      const prizeText = noWinner ? "Bote desierto"
        : r.monthly ? `${fmt(r.prize)}/mes × ${r.winners} ganador${r.winners!==1?"es":""}`
        : `${fmt(r.prize)} × ${r.winners} ganador${r.winners!==1?"es":""}`;
      const prizeColor = noWinner ? "var(--text-2)" : c.color;

      const mainBalls = r.numbers.map(n => ball(n,"normal")).join("");
      let extras = "";
      if(r.stars)       extras += `<span class="ball-sep">&#9733;</span>` + r.stars.map(n => ball(n,"star")).join("");
      if(r.complement != null) extras += `<span class="ball-sep">C</span>` + ball(r.complement,"compl");
      if(r.dream != null)      extras += `<span class="ball-sep">D</span>` + ball(r.dream,"dream");
      if(r.reintegro != null)  extras += `<span class="ball-sep">R</span>` + ball(r.reintegro,"rein");

      return `
        <div class="result-card" style="border-left-color:${c.color}">
          <div class="result-top">
            <div class="result-meta">
              ${gameIcon(r.id_game)}
              <div>
                <div class="game-name">${r.name}</div>
                <div class="game-date">${fmtShort(r.date)}</div>
              </div>
            </div>
            <div>
              <div class="result-prize-label">Premio 1.º</div>
              <div class="result-prize" style="color:${prizeColor}">${prizeText}</div>
            </div>
          </div>
          <div class="balls-row">${mainBalls}${extras}</div>
        </div>`;
    }).join("")}
    </div>`;
}

// ── Carga de datos ────────────────────────────────────────
async function fetchBotes(){
  try {
    const res = await fetch(API_BOTES);
    if(!res.ok) throw new Error(res.status);
    return await res.json();
  } catch(e){
    console.warn("API botes no disponible, usando datos demo:", e.message);
    return DEMO_JACKPOTS;
  }
}

async function fetchResults(){
  try {
    const res = await fetch(API_RESULTS);
    if(!res.ok) throw new Error(res.status);
    return await res.json();
  } catch(e){
    console.warn("API resultados no disponible, usando datos demo:", e.message);
    return DEMO_RESULTS;
  }
}

// ── Lógica de la app ──────────────────────────────────────
function setTab(tab){
  gTab = tab;
  document.getElementById("tab-botes").className      = "tab-btn" + (tab==="botes"?" active":"");
  document.getElementById("tab-resultados").className = "tab-btn" + (tab==="resultados"?" active":"");
  paintContent();
}

function paintContent(){
  const el = document.getElementById("content");
  if(gTab === "botes")       el.innerHTML = renderBotes(gBotes);
  else if(gTab === "resultados") el.innerHTML = renderResultados(gResults);
}

async function doRefresh(){
  const btn = document.getElementById("btn-refresh");
  btn.disabled = true;
  btn.textContent = "Actualizando...";
  document.getElementById("content").innerHTML =
    `<div class="loading-msg"><span class="spinner"></span>Actualizando...</div>`;

  const [botes, results] = await Promise.all([fetchBotes(), fetchResults()]);
  gBotes   = botes;
  gResults = results;

  const now = new Date();
  document.getElementById("hdr-updated").textContent = `Actualizado a las ${fmtTime(now)}`;
  btn.disabled = false;
  btn.textContent = "↺ Actualizar";
  paintContent();
}

// ── Auto-refresh ──────────────────────────────────────────
function scheduleRefresh(){
  if(refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(async()=>{
    await doRefresh();
    scheduleRefresh();
  }, REFRESH_MS);
}

// ── Arranque ──────────────────────────────────────────────
(async()=>{
  const [botes, results] = await Promise.all([fetchBotes(), fetchResults()]);
  gBotes   = botes;
  gResults = results;
  document.getElementById("hdr-updated").textContent =
    `Actualizado a las ${fmtTime(new Date())}`;
  paintContent();
  scheduleRefresh();
})();
</script>
</body>
</html>
